version: '3'
services:
  echo-server:
    image: webserver
    container_name: webserver
    ports:
      - 8080:80
    restart: always

  nginx-proxy:
    image: nginx
    container_name: nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./conf.d/:/etc/nginx/conf.d/:ro
      - ./certs:/etc/certs:ro
